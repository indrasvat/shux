# lefthook.yml — git hooks for shux
# Install: lefthook install (or: make hooks)
# All commands use Makefile targets — never raw cargo/script invocations.

pre-commit:
  parallel: true
  commands:
    fmt-check:
      glob: "*.rs"
      run: make fmt-check
    clippy:
      glob: "*.rs"
      run: make clippy

# The lens frozen-path guard (PRD §16.2) runs at commit-msg time because it must
# read the commit message for a `LENS-TEST-CHANGE:` trailer — pre-commit hooks
# cannot access the message. `{1}` is the commit-message file path.
commit-msg:
  commands:
    lens-frozen:
      run: make check-lens-frozen MSG={1}

# pre-push mirrors CI exactly so a clean local push survives CI:
#   - `make test`       → matches CI Test job (`cargo nextest run --workspace`)
#   - `make test-doc`   → matches CI Test job's doc-test step
#   - `make deny`       → matches CI Deny job (strict — was `deny-soft` until
#                         a license issue slipped through to CI; pushes now
#                         block on cargo-deny rejections).
#   - `make check-progress` is local-only (CI doesn't gate on PROGRESS.md
#     updates but the team policy does).
pre-push:
  commands:
    progress-check:
      run: make check-progress
    test:
      run: make test
    test-doc:
      run: make test-doc
    deny:
      run: make deny
