name: Deploy Pages

# Production deploy path for shux.pages.dev. Triggers on Release
# workflow completion, on pages/** pushes to main, and via manual
# dispatch. The Pages project is Git-connected, so every branch push
# gets a PREVIEW deploy (and a "Cloudflare Pages" check on the PR)
# built from `pages/` — that is how a site change gets reviewed before
# it merges.
#
# Production is deliberately NOT reachable from Git, behind two
# independent guards: `production_branch` is the "production" sentinel
# that nothing ever pushes to, AND `production_deployments_enabled` is
# false on the project. This workflow's `wrangler pages deploy
# --branch=production` is the sole production path, with no race
# against git auto-deploy.
#
# Both guards matter because the deployed tree is NOT `pages/` — the
# steps below stage `install.sh`, `version.json` and `CHANGELOG.md`
# into `deploy/`. A Git-built production deploy would publish `pages/`
# alone and 404 the documented `curl -fsSL .../install.sh | sh` path,
# so it must never be able to run.
#
# Only `github.repository` (non-attacker-controlled) is read from the
# github context — no event payloads are interpolated into shell.

on:
  workflow_run:
    workflows: [Release]
    types: [completed]
  push:
    branches: [main]
    paths:
      - 'pages/**'
      - '.github/workflows/deploy-pages.yml'
      # Now that this workflow copies the repo-root installer into
      # `deploy/install.sh`, an install.sh change on main must redeploy
      # Pages too — otherwise shux.pages.dev/install drifts from the
      # canonical script (codex review on PR #27).
      - 'install.sh'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # workflow_run fires regardless of branch — gate head_branch=main.
    if: >-
      ${{ github.event_name != 'workflow_run'
          || (github.event.workflow_run.conclusion == 'success'
              && github.event.workflow_run.head_branch == 'main') }}
    env:
      REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      - name: Stage pages content
        run: |
          mkdir -p deploy
          cp -r pages/. deploy/

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest

      - name: Count workspace tests (stamped into version.json so the
          landing page can show a live "N tests passing" chip)
        id: testcount
        run: |
          set -euo pipefail
          count=$(cargo nextest list --workspace --message-format json 2>/dev/null \
                  | jq '."test-count"')
          [[ "$count" =~ ^[0-9]+$ ]] || { echo "couldn't parse test count"; count=0; }
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Workspace test count: $count"

      - name: Stage install script + version marker
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TEST_COUNT: ${{ steps.testcount.outputs.count }}
        run: |
          set -euo pipefail
          latest="$(gh release list --repo "$REPO" --limit 1 \
                     --json tagName --jq '.[0].tagName // ""')"
          if [[ -n "$latest" ]]; then
            published_at="$(gh release view "$latest" --repo "$REPO" \
                            --json publishedAt --jq '.publishedAt')"
            {
              printf '{\n'
              printf '  "version": "%s",\n' "$latest"
              printf '  "published_at": "%s",\n' "$published_at"
              printf '  "release_url": "https://github.com/%s/releases/tag/%s",\n' "$REPO" "$latest"
              printf '  "tests_passing": %s\n' "$TEST_COUNT"
              printf '}\n'
            } > deploy/version.json
            echo "Stamped deploy/version.json for $latest ($TEST_COUNT tests)."
          fi

          # Ship the canonical, repo-root install.sh — single source of
          # truth, exercised by the e2e suite. Issue #25 traced a
          # Linux asset-name mismatch (`x86_64-unknown-linux-gnu` vs
          # the actual `x86_64-linux`) to a previous inline shim that
          # had drifted from the real installer's naming.
          cp install.sh deploy/install.sh
          chmod +x deploy/install.sh

      - name: Stage CHANGELOG
        run: |
          if [[ -f CHANGELOG.md ]]; then
            cp CHANGELOG.md deploy/CHANGELOG.md
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy deploy --project-name=shux --branch=production
