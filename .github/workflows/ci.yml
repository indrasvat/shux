name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**", "refactor/**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      # macOS runner image macos-15-arm64/20260511.0048+ ships a Homebrew-
      # managed rustup whose cargo/rustc shims dispatch as rustup-init
      # instead of cargo, breaking every cargo invocation. Wipe the brew
      # rustup so dtolnay/rust-toolchain does a clean rustup-init install
      # into $HOME/.cargo/bin (which it then prepends to PATH).
      - name: Workaround broken Homebrew rustup on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew uninstall --ignore-dependencies --force rustup rustup-init 2>/dev/null || true
          sudo rm -f /opt/homebrew/bin/cargo /opt/homebrew/bin/rustc \
            /opt/homebrew/bin/rustup /opt/homebrew/bin/rustup-init \
            /opt/homebrew/bin/rustdoc /opt/homebrew/bin/rust-gdb \
            /opt/homebrew/bin/rust-lldb 2>/dev/null || true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: Run tests
        run: cargo nextest run --workspace
      - name: Doc tests
        run: cargo test --workspace --doc

  # End-to-end smoke: builds shux, runs the daemon, exercises every feature
  # an agent would actually use (init, apply, wait-for, snapshot, kill) on
  # both Linux and macOS. The in-process `test` job covers Rust logic; this
  # catches platform regressions in PTY spawn / daemon UDS / raster that
  # only show up against a real binary. No untrusted inputs are evaluated;
  # we only read `runner.os` and run a script committed in the repo.
  e2e-smoke:
    name: E2E smoke
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      # See `test` job above — same Homebrew rustup conflict on macos-15.
      - name: Workaround broken Homebrew rustup on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew uninstall --ignore-dependencies --force rustup rustup-init 2>/dev/null || true
          sudo rm -f /opt/homebrew/bin/cargo /opt/homebrew/bin/rustc \
            /opt/homebrew/bin/rustup /opt/homebrew/bin/rustup-init \
            /opt/homebrew/bin/rustdoc /opt/homebrew/bin/rust-gdb \
            /opt/homebrew/bin/rust-lldb 2>/dev/null || true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install jq + file (Linux only — macOS runners ship them)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends jq file
      - name: Build shux (release)
        run: cargo build --release -p shux
      - name: Run end-to-end smoke (happy path)
        run: SHUX="$PWD/target/release/shux" bash .shux/scripts/smoke.sh
      - name: Run integration regressions (12 deterministic scenarios)
        run: SHUX="$PWD/target/release/shux" bash .shux/scripts/integration.sh

  # Workspace test coverage via cargo-llvm-cov. Uploads lcov to codecov.io;
  # the README badge tracks this metric. Linux-only (codecov uploader
  # works fine cross-platform but llvm-cov on macOS pulls in xcode tools
  # that slow CI and don't change the % materially).
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@nextest
      - name: Generate lcov.info
        run: cargo llvm-cov nextest --workspace --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
          # CODECOV_TOKEN is optional for public repos but recommended.
          token: ${{ secrets.CODECOV_TOKEN }}

  deny:
    name: Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  # Forward-looking advisory lint pass against the beta toolchain.
  # Surfaces lints that clippy will warn on once beta lands as stable
  # (~6 weeks later), so we have time to fix them before they become
  # blocking. continue-on-error keeps CI green; failures show up as a
  # yellow advisory annotation on the PR.
  lint-beta:
    name: Clippy (beta — advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@beta
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: lint-beta
      - name: Print toolchain
        run: rustc +beta --version && cargo +beta clippy --version
      - name: Clippy (beta)
        run: cargo +beta clippy --workspace --all-targets -- -D warnings
