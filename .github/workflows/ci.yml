name: CI

# Trigger model (post-2026-05-14 rework):
#
# - `pull_request: [main]` fires for every PR push. This is the primary
#   per-commit gate.
# - `push: [main]` fires once after merge — used to run the heavier signals
#   we skip on PRs (coverage upload, clippy-beta).
# - NO `push: [feat/**, fix/**, refactor/**]`. Previously this doubled
#   CI runs on every PR-branch push (both `push` AND `pull_request` would
#   fire on the same commit).
# - `schedule:` runs the advisory refresh (cargo-deny against a changing
#   advisory db, clippy-beta against a moving stable target).
#
# `concurrency.cancel-in-progress` kills superseded in-flight PR runs when
# you push a fixup, but never cancels main-branch runs (those may be
# release-bump commits we want to complete atomically).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Mondays 09:00 UTC — advisory refresh.
    - cron: '0 9 * * 1'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  check:
    name: Check
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test-ubuntu:
    name: Test (ubuntu)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: Run tests
        run: cargo nextest run --workspace
      - name: Doc tests
        run: cargo test --workspace --doc

  e2e-ubuntu:
    name: E2E smoke (ubuntu)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install jq + file
        run: sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends jq file
      - name: Build shux (release)
        run: cargo build --release -p shux
      - name: Run end-to-end smoke (happy path)
        run: SHUX="$PWD/target/release/shux" bash .shux/scripts/smoke.sh
      - name: Run integration regressions (12 deterministic scenarios)
        run: SHUX="$PWD/target/release/shux" bash .shux/scripts/integration.sh

  # Combined macOS job: unit tests + doc tests + e2e smoke + integration
  # all on a single runner. macOS pricing is ~10x Linux; deduping setup
  # (checkout/toolchain install/cache restore) saves ~30% vs running
  # `Test (macos)` and `E2E smoke (macos)` as two parallel jobs.
  #
  # Toolchain note: the macos-15-arm64 runner image (20260511.0048+)
  # ships a Homebrew-managed rustup whose cargo/rustc proxy shims are
  # broken — see Homebrew/homebrew-core#178311. dtolnay/rust-toolchain
  # detects rustup on PATH via `command -v rustup`, skips its curl
  # install, and we end up with no working cargo.
  #
  # Fix: pin CARGO_HOME and RUSTUP_HOME into `runner.temp` and run
  # rustup-init into that isolated location BEFORE dtolnay runs. dtolnay
  # then finds OUR rustup on PATH, installs the stable toolchain into
  # our isolated dirs, and everything works without touching the broken
  # Homebrew install or any stale ~/.rustup state on the image.
  macos:
    name: macOS (test + smoke)
    if: github.event_name != 'schedule'
    runs-on: macos-latest
    env:
      CARGO_HOME: ${{ runner.temp }}/cargo
      RUSTUP_HOME: ${{ runner.temp }}/rustup
    steps:
      - uses: actions/checkout@v4
      - name: Install isolated rustup
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 --retry 10 --retry-connrefused \
            -fsSL https://sh.rustup.rs \
            | sh -s -- -y --profile minimal --default-toolchain none --no-modify-path
          echo "$CARGO_HOME/bin" >> "$GITHUB_PATH"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: Unit tests (nextest + doc)
        run: |
          cargo nextest run --workspace
          cargo test --workspace --doc
      - name: Build shux (release)
        run: cargo build --release -p shux
      - name: End-to-end smoke (happy path)
        run: SHUX="$PWD/target/release/shux" bash .shux/scripts/smoke.sh
      - name: Integration regressions (12 deterministic scenarios)
        run: SHUX="$PWD/target/release/shux" bash .shux/scripts/integration.sh

  # Codecov tracks the release line, not per-PR gates. Main-only.
  coverage:
    name: Coverage
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@nextest
      - name: Generate lcov.info
        run: cargo llvm-cov nextest --workspace --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
          # CODECOV_TOKEN is optional for public repos but recommended.
          token: ${{ secrets.CODECOV_TOKEN }}

  # License + advisory audit. Cheap on Linux (~45s), so kept on every
  # PR. The weekly schedule re-runs it so advisories that drop against
  # unchanged dependencies are caught even if no PR touches Cargo files.
  deny:
    name: Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  # Beta-toolchain clippy — forward-looking lint pass. continue-on-error
  # means it never blocks; signal is purely advisory. Weekly + main-push
  # cadence is plenty (the stable target shifts every ~6 weeks).
  lint-beta:
    name: Clippy (beta — advisory)
    if: github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@beta
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: lint-beta
      - name: Print toolchain
        run: rustc +beta --version && cargo +beta clippy --version
      - name: Clippy (beta)
        run: cargo +beta clippy --workspace --all-targets -- -D warnings
