<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>shux img diag</title>
<style>
body{background:#1a1613;color:#e8e2d8;font:14px/1.5 -apple-system,monospace;padding:16px}
.case{margin-bottom:24px;border:1px solid #444;border-radius:8px;padding:12px}
.case h2{font-size:13px;margin:0 0 8px;color:#e8984a}
img{max-width:100%;display:block;background:#0a0810}
.status{font-family:monospace;font-size:12px;margin-top:6px;color:#9c9}
</style></head><body>
<h1 style="font-size:16px">shux image diagnostic — just open this page, results auto-report</h1>

<div class="case"><h2>A — bare img, no attributes</h2>
<img src="/screenshots/lens-heat.png?d=a" id="a">
<div class="status" id="sa">loading…</div></div>

<div class="case"><h2>B — production markup (styled, async, priority)</h2>
<img src="/screenshots/lens-heat.png?d=b" id="b" width="576" height="228" decoding="async" fetchpriority="high" style="aspect-ratio:576/228;width:100%;height:auto">
<div class="status" id="sb">loading…</div></div>

<div class="case"><h2>C — different filename (blocker-rule test)</h2>
<img src="/screenshots/deploy-board.png?d=c" id="c">
<div class="status" id="sc">loading…</div></div>

<div class="case"><h2>D — known-good production asset (lg-03)</h2>
<img src="/screenshots/lg-03.png?d=d" id="d" style="max-width:100%">
<div class="status" id="sd">loading…</div></div>

<div class="case"><h2>Environment</h2><div class="status" id="env"></div></div>

<script>
function beacon(q){ fetch('/probe?'+q+'&t='+Date.now()).catch(function(){}); }
['a','b','c','d'].forEach(function(id){
  var img=document.getElementById(id), st=document.getElementById('s'+id);
  function ok(){ st.textContent='LOADED '+img.naturalWidth+'x'+img.naturalHeight; beacon('img='+id+'&ev=load&w='+img.naturalWidth); }
  function bad(){ st.textContent='ERROR'; beacon('img='+id+'&ev=error'); }
  if(img.complete && img.naturalWidth>0){ ok(); } else { img.onload=ok; img.onerror=bad; }
});
setTimeout(function(){
  ['a','b','c','d'].forEach(function(id){
    var img=document.getElementById(id);
    var r=img.getBoundingClientRect();
    var cs=getComputedStyle(img);
    beacon('img='+id+'&ev=paint&rw='+Math.round(r.width)+'&rh='+Math.round(r.height)+'&disp='+cs.display+'&vis='+cs.visibility+'&op='+cs.opacity);
  });
  var e=document.getElementById('env');
  e.textContent=navigator.userAgent;
  beacon('ev=env&ua='+encodeURIComponent(navigator.userAgent.slice(0,120)));
}, 2500);
</script>
</body></html>
